      <text x="94" y="223" class="num">267</text>
      <text x="250" y="219" class="small">GitHub year</text>
    </g><g filter="url(#shadow)">
      <rect x="424" y="145" width="316" height="100" rx="20" fill="#0F172A" stroke="#334155"/>
      <text x="448" y="177" class="micro">REPOSITORIES</text>
      <text x="448" y="223" class="num">94</text>
      <text x="604" y="219" class="small">public repos</text>
    </g><g filter="url(#shadow)">
      <rect x="778" y="145" width="316" height="100" rx="20" fill="#0F172A" stroke="#334155"/>
      <text x="802" y="177" class="micro">STARS</text>
      <text x="802" y="223" class="num">17</text>
      <text x="958" y="219" class="small">repository stars</text>
    </g><g filter="url(#shadow)">
      <rect x="70" y="271" width="316" height="100" rx="20" fill="#0F172A" stroke="#334155"/>
      <text x="94" y="303" class="micro">FOLLOWERS</text>
      <text x="94" y="349" class="num">16</text>
      <text x="250" y="345" class="small">followers</text>
    </g><g filter="url(#shadow)">
      <rect x="424" y="271" width="316" height="100" rx="20" fill="#0F172A" stroke="#334155"/>
      <text x="448" y="303" class="micro">CURRENT STREAK</text>
      <text x="448" y="349" class="num">2</text>
      <text x="604" y="345" class="small">active days</text>
    </g><g filter="url(#shadow)">
      <rect x="778" y="271" width="316" height="100" rx="20" fill="#0F172A" stroke="#334155"/>
      <text x="802" y="303" class="micro">LONGEST STREAK</text>
      <text x="802" y="349" class="num">7</text>
      <text x="958" y="345" class="small">best run</text>
    </g>
  <text x="70" y="468" class="micro">AUTO-GENERATED BY WORKFLOW - UPDATED 2026-07-09</text>
