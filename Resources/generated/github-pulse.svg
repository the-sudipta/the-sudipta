<svg width="1200" height="500" viewBox="0 0 1200 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub Metrics">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="500">
      <stop stop-color="#020617"/>
      <stop offset=".58" stop-color="#07111F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="aura" x1="76" y1="40" x2="1124" y2="470">
      <stop stop-color="#22D3EE"/>
      <stop offset=".5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
