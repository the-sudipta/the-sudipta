name: Update profile metrics

on:
  schedule:
    - cron: "17 */12 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/generate-profile-metrics.js"
      - ".github/workflows/profile-metrics.yml"

permissions:
  contents: write

jobs:
  update-profile-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate live SVG charts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: the-sudipta
        run: node scripts/generate-profile-metrics.js

      - name: Commit updated charts
        run: |
          if [[ -n "$(git status --porcelain Resources/generated)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Resources/generated
            git commit -m "chore: update profile metrics"
            git push
          else
            echo "No metric changes to commit."
          fi
